<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0F172A;color:#F1F5F9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
.card{background:#1E293B;border:1px solid #334155;border-radius:10px;padding:16px}
.btn{cursor:pointer;border:1px solid #334155;border-radius:6px;padding:8px 16px;font-size:13px;transition:all .2s;font-family:inherit}
.btn-active{background:#3B82F6;border-color:#3B82F6;color:#fff}
.btn-inactive{background:#1E293B;color:#94A3B8}
.btn-inactive:hover{background:#334155;color:#F1F5F9}
select{background:#1E293B;color:#F1F5F9;border:1px solid #334155;border-radius:6px;padding:8px 12px;font-size:13px;outline:none;cursor:pointer;font-family:inherit}
select:focus{border-color:#3B82F6}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#0F172A;color:#94A3B8;text-align:left;padding:8px 10px;font-weight:600;position:sticky;top:0;z-index:1;border-bottom:1px solid #334155;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #1a2744;color:#F1F5F9}
tr:hover td{background:rgba(51,65,85,.3)}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700}
.badge-red{background:rgba(239,68,68,.2);color:#EF4444}
.badge-green{background:rgba(34,197,94,.2);color:#22C55E}
.badge-yellow{background:rgba(245,158,11,.2);color:#F59E0B}
.badge-blue{background:rgba(59,130,246,.2);color:#3B82F6}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0F172A}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.tab-bar{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.filter-bar{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;margin-bottom:20px;padding:16px;background:#1E293B;border:1px solid #334155;border-radius:10px}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{color:#94A3B8;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.chart-title{color:#94A3B8;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.overflow-auto{overflow:auto;max-height:520px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:960px){.grid-2{grid-template-columns:1fr}}
#error-box{display:none;position:fixed;top:0;left:0;right:0;background:#EF4444;color:#fff;padding:12px 20px;font-size:13px;z-index:9999;font-family:monospace}
</style>

<script type="text/babel">
(function() {
"use strict";

var useState = React.useState;
var useMemo = React.useMemo;
var useCallback = React.useCallback;

var BarChart = Recharts.BarChart;
var Bar = Recharts.Bar;
var XAxis = Recharts.XAxis;
var YAxis = Recharts.YAxis;
var CartesianGrid = Recharts.CartesianGrid;
var Tooltip = Recharts.Tooltip;
var Legend = Recharts.Legend;
var ResponsiveContainer = Recharts.ResponsiveContainer;
var Cell = Recharts.Cell;
var LabelList = Recharts.LabelList;
var ReferenceLine = Recharts.ReferenceLine;

// ---- CONSTANTS ----
var COLORS = {
  FULFILLMENT: '#3B82F6',
  SELF_SERVICE: '#22C55E',
  CROSS_DOCKING: '#F59E0B',
  XD_DROP_OFF: '#8B5CF6',
  DROP_OFF: '#EF4444'
};
var PICK_LABELS = {
  FULFILLMENT: 'Fulfillment',
  SELF_SERVICE: 'Self Service',
  CROSS_DOCKING: 'Cross Docking',
  XD_DROP_OFF: 'XD Drop Off',
  DROP_OFF: 'Drop Off'
};
var PICK_ORDER = ['FULFILLMENT','SELF_SERVICE','CROSS_DOCKING','XD_DROP_OFF','DROP_OFF'];
var TEXT = '#F1F5F9';
var MUTED = '#94A3B8';
var BORDER = '#334155';
var CARD = '#1E293B';

function fmt(v, dec) {
  if (dec === undefined) dec = 2;
  if (v === null || v === undefined || isNaN(v)) return '—';
  return Number(v).toFixed(dec);
}
function fmtM(v) {
  if (!v && v !== 0) return '—';
  if (Math.abs(v) >= 1e9) return (v/1e9).toFixed(1)+'B';
  if (Math.abs(v) >= 1e6) return (v/1e6).toFixed(1)+'M';
  if (Math.abs(v) >= 1e3) return (v/1e3).toFixed(0)+'K';
  return String(v);
}
function fmtB(v) {
  if (!v && v !== 0) return '—';
  if (Math.abs(v) >= 1e9) return (v/1e9).toFixed(2)+'B';
  if (Math.abs(v) >= 1e6) return (v/1e6).toFixed(1)+'M';
  if (Math.abs(v) >= 1e3) return (v/1e3).toFixed(0)+'K';
  return String(v);
}
function pickLabel(k) { return PICK_LABELS[k] || k; }
function pickColor(k) { return COLORS[k] || '#64748B'; }

function sumRows(rows) {
  if (!rows || rows.length === 0) return null;
  var total_v25 = 0, total_v26 = 0;
  var sum_o25 = 0, sum_o26 = 0;
  var sum_p25w = 0, sum_p26w = 0;
  var sum_imp = 0;
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var v25 = r.visits_25 || 0;
    var v26 = r.visits_26 || 0;
    total_v25 += v25;
    total_v26 += v26;
    sum_o25 += (r.c25 || 0) / 100 * v25;
    sum_o26 += (r.c26 || 0) / 100 * v26;
    sum_p25w += (r.p25 || 0) * v25;
    sum_p26w += (r.p26 || 0) * v26;
    sum_imp += (r.impacto || 0);
  }
  var p25 = total_v25 > 0 ? sum_p25w / total_v25 : 0;
  var p26 = total_v26 > 0 ? sum_p26w / total_v26 : 0;
  var c25 = total_v25 > 0 ? (sum_o25 / total_v25) * 100 : 0;
  var c26 = total_v26 > 0 ? (sum_o26 / total_v26) * 100 : 0;
  return {
    p25: p25, p26: p26, delta_p: p26 - p25,
    c25: c25, c26: c26, delta_c: c25 > 0 ? ((c26 - c25) / c25) * 100 : 0,
    visits_25: total_v25, visits_26: total_v26, impacto: sum_imp
  };
}

function groupBy(rows, key) {
  var map = {};
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var k = r[key];
    if (!map[k]) map[k] = [];
    map[k].push(r);
  }
  var result = [];
  var keys = Object.keys(map);
  for (var j = 0; j < keys.length; j++) {
    var kk = keys[j];
    var agg = sumRows(map[kk]);
    var obj = {};
    obj[key] = kk;
    for (var prop in agg) obj[prop] = agg[prop];
    result.push(obj);
  }
  return result;
}

function getKPI(fDomain, fEstado, fPicking, fRango) {
  var D = DATA;
  if (fRango) {
    for (var i = 0; i < D.rango_data.length; i++) {
      if (D.rango_data[i].rango === fRango) return D.rango_data[i];
    }
  }
  if (fDomain && fPicking) {
    return sumRows(D.dom_pick.filter(function(r){ return r.domain===fDomain && r.picking===fPicking; }));
  }
  if (fEstado && fPicking) {
    return sumRows(D.est_pick.filter(function(r){ return r.estado===fEstado && r.picking===fPicking; }));
  }
  if (fDomain && fEstado) {
    return sumRows(D.dom_est.filter(function(r){ return r.domain===fDomain && r.estado===fEstado; }));
  }
  if (fDomain) {
    return sumRows(D.domain_data.filter(function(r){ return r.domain===fDomain; }));
  }
  if (fEstado) {
    return sumRows(D.estado_data.filter(function(r){ return r.estado===fEstado; }));
  }
  if (fPicking) {
    return sumRows(D.pick_data.filter(function(r){ return r.picking===fPicking; }));
  }
  return {
    p25: D.kpi_25.promessa, p26: D.kpi_26.promessa,
    delta_p: D.kpi_delta.delta_p,
    c25: D.kpi_25.conv, c26: D.kpi_26.conv,
    delta_c: D.kpi_delta.delta_c,
    visits_25: D.kpi_25.visits, visits_26: D.kpi_26.visits,
    impacto: D.kpi_delta.impacto
  };
}

function getPickData(fDomain, fEstado) {
  var D = DATA;
  if (fDomain) return groupBy(D.dom_pick.filter(function(r){ return r.domain===fDomain; }), 'picking');
  if (fEstado) return groupBy(D.est_pick.filter(function(r){ return r.estado===fEstado; }), 'picking');
  return D.pick_data;
}

function getDomainData(fPicking, fEstado) {
  var D = DATA;
  if (fPicking && fEstado) {
    var domSet = {};
    D.dom_pick.filter(function(r){ return r.picking===fPicking; }).forEach(function(r){ domSet[r.domain]=true; });
    return groupBy(D.dom_est.filter(function(r){ return r.estado===fEstado && domSet[r.domain]; }), 'domain');
  }
  if (fPicking) return groupBy(D.dom_pick.filter(function(r){ return r.picking===fPicking; }), 'domain');
  if (fEstado) return groupBy(D.dom_est.filter(function(r){ return r.estado===fEstado; }), 'domain');
  return D.domain_data;
}

function getEstadoData(fPicking, fDomain) {
  var D = DATA;
  if (fPicking && fDomain) return D.est_pick.filter(function(r){ return r.picking===fPicking; });
  if (fPicking) return D.est_pick.filter(function(r){ return r.picking===fPicking; });
  if (fDomain) return groupBy(D.dom_est.filter(function(r){ return r.domain===fDomain; }), 'estado');
  return D.estado_data;
}

// ---- COMPONENTS ----
function CustomTooltip(props) {
  var active = props.active, payload = props.payload, label = props.label;
  if (!active || !payload || !payload.length) return null;
  return (
    <div style={{background:CARD,border:'1px solid '+BORDER,borderRadius:8,padding:'10px 14px',fontSize:12,maxWidth:260}}>
      <div style={{color:TEXT,fontWeight:700,marginBottom:6,wordBreak:'break-word'}}>{label}</div>
      {payload.map(function(p,i){
        return (
          <div key={i} style={{color:p.color||TEXT,marginBottom:2}}>
            {p.name}: <strong>{typeof p.value === 'number' ? p.value.toFixed(2) : p.value}</strong>
          </div>
        );
      })}
    </div>
  );
}

function KpiCard(props) {
  var title = props.title, value = props.value, suffix = props.suffix, di = props.di, sub = props.sub;
  return (
    <div className="card">
      <div style={{color:MUTED,fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:6}}>{title}</div>
      <div style={{fontSize:26,fontWeight:800,color:TEXT,lineHeight:1.1}}>
        {value}
        {suffix && <span style={{fontSize:14,fontWeight:400,color:MUTED,marginLeft:4}}>{suffix}</span>}
      </div>
      {di && <div style={{marginTop:6,fontSize:12,color:di.color,fontWeight:600}}>{di.text}</div>}
      {sub && <div style={{marginTop:4,fontSize:11,color:MUTED}}>{sub}</div>}
    </div>
  );
}

function mkDelta(v, unit, inv) {
  if (v === null || v === undefined || isNaN(v)) return null;
  var positive = inv ? v < 0 : v > 0;
  var color = positive ? '#22C55E' : (v < 0 ? '#EF4444' : MUTED);
  return { color: color, text: (v > 0 ? '+' : '') + fmt(v) + ' ' + (unit||'p.p.') };
}

var TABS = ['Visão Geral','Por Categoria','Por Estado','Ofensores','Elasticidade & Rango','Mix Logístico','Hipóteses'];

function App() {
  var stateTab = useState(0);
  var tab = stateTab[0], setTab = stateTab[1];

  var statePicking = useState('');
  var fPicking = statePicking[0], setFPicking = statePicking[1];
  var stateRango = useState('');
  var fRango = stateRango[0], setFRango = stateRango[1];

  var domains = useMemo(function() {
    var arr = DATA.domain_data.map(function(r){ return r.domain; });
    arr = arr.filter(function(v,i,a){ return a.indexOf(v)===i; });
    arr.sort();
    return arr;
  }, []);

  var estados = useMemo(function() {
    var arr = DATA.estado_data.map(function(r){ return r.estado; });
    arr = arr.filter(function(v,i,a){ return a.indexOf(v)===i; });
    arr.sort();
    return arr;
  }, []);

  var rangos = useMemo(function() {
    return DATA.rango_data.map(function(r){ return r.rango; });
  }, []);

  var kpi = useMemo(function(){ return getKPI(fDomain, fEstado, fPicking, fRango); }, [fDomain,fEstado,fPicking,fRango]);

  var pickRows = useMemo(function(){ return getPickData(fDomain, fEstado); }, [fDomain,fEstado]);
  var domRows = useMemo(function(){ return getDomainData(fPicking, fEstado); }, [fPicking,fEstado]);
  var estRows = useMemo(function(){ return getEstadoData(fPicking, fDomain); }, [fPicking,fDomain]);

  var pickSorted = useMemo(function(){
    return pickRows.slice().sort(function(a,b){ return (b.delta_p||0)-(a.delta_p||0); });
  }, [pickRows]);

  var top20Dom = useMemo(function(){
    return domRows.slice().sort(function(a,b){ return Math.abs(b.impacto||0)-Math.abs(a.impacto||0); }).slice(0,20);
  }, [domRows]);

  var top20DomDelta = useMemo(function(){
    return domRows.slice().sort(function(a,b){ return (b.delta_p||0)-(a.delta_p||0); }).slice(0,20);
  }, [domRows]);

  var domSorted = useMemo(function(){
    return domRows.slice().sort(function(a,b){ return Math.abs(b.impacto||0)-Math.abs(a.impacto||0); });
  }, [domRows]);

  var estSorted = useMemo(function(){
    return estRows.slice().sort(function(a,b){ return (b.delta_p||0)-(a.delta_p||0); });
  }, [estRows]);

  var ofensores = useMemo(function(){
    var rows = DATA.dom_est;
    if (fDomain) rows = rows.filter(function(r){ return r.domain===fDomain; });

    if (fPicking) {
      var ds = {};

  function KpiSection() {

      <div className="kpi-grid">

          return (

              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,flexWrap:'wrap'}}>
                <span style={{fontSize:15,fontWeight:800,color:h.color}}>{h.title}</span>
                <span className="badge" style={{background:h.color+'33',color:h.color,flexShrink:0}}>{h.badge}</span>
              </div>
              <p style={{color:MUTED,fontSize:14,lineHeight:1.75}}>{h.body}</p>
            </div>
          );
        })}
        <div className="card">
          <div className="chart-title" style={{marginBottom:10}}>Resumo Executivo</div>
          <p style={{color:MUTED,fontSize:14,lineHeight:1.8}}>
            O Lead Time de Promessa de Entrega cresceu <strong style={{color:'#EF4444'}}>+1.61 p.p.</strong> no Q1/26 vs Q1/25
            (de 5.5% para 7.11%), afetando <strong style={{color:'#EF4444'}}>903M</strong> de visitas e gerando
            impacto estimado de <strong style={{color:'#EF4444'}}>1.46B</strong>.
            A conversão geral recuou <strong style={{color:'#EF4444'}}>-0.13 p.p.</strong> (6.811% → 6.802%).
            Drop Off é o principal ofensor em magnitude com 23.39% de promessa.
            Cross Docking e Fulfillment respondem pela maior parte do volume de visitas.
            Os estados com maior degradação incluem Acre (+5.99 p.p.), Bahia e Amapá.
            Categorias de espelhos e móveis lideram o ranking de impacto por domínio.
          </p>
        </div>
      </div>
    );
  }

  return (
    <div style={{padding:'20px 24px',maxWidth:1440,margin:'0 auto'}}>
      <div style={{marginBottom:20,display:'flex',alignItems:'center',gap:14}}>
        <div style={{
          width:36,height:36,borderRadius:8,
          background:'linear-gradient(135deg,#FFE600 0%,#F59E0B 100%)',
          display:'flex',alignItems:'center',justifyContent:'center',
          fontWeight:900,fontSize:14,color:'#0F172A',flexShrink:0
        }}>ML</div>
        <div>
          <h1 style={{fontSize:18,fontWeight:800,color:TEXT,lineHeight:1}}>Lead Time de Promessa de Entrega</h1>
          <p style={{color:MUTED,fontSize:12,marginTop:3}}>Análise Q1/25 vs Q1/26 — Mercado Livre Brasil</p>
        </div>
      </div>

      <FilterBar />

      <div className="tab-bar">
        {TABS.map(function(t,i){
          return (
            <button key={i} className={'btn '+(tab===i?'btn-active':'btn-inactive')} onClick={function(){ setTab(i); }}>
              {t}
            </button>
          );
        })}
      </div>

      {tab===0 && <Tab0 />}
      {tab===1 && <Tab1 />}
      {tab===2 && <Tab2 />}
      {tab===3 && <Tab3 />}
      {tab===4 && <Tab4 />}
      {tab===5 && <Tab5 />}
      {tab===6 && <Tab6 />}
    </div>
  );
}

var rootEl = document.getElementById('root');
var root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(App));

})();
</script>
</body>
</html>
