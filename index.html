<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard · Diagnóstico Lead Time de Promessa</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0F172A; color: #F1F5F9; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1E293B; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    select { appearance: none; -webkit-appearance: none; }
    table { border-collapse: collapse; width: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
  const {
    BarChart, Bar, ComposedChart,
    XAxis, YAxis, CartesianGrid, Tooltip, Legend,
    ResponsiveContainer, ReferenceLine, Cell, PieChart, Pie
  } = Recharts;

  // ─── Paleta ──────────────────────────────────────────────────────────────────
  const C = {
    full:   '#3B82F6',  // Fulfillment — azul
    self:   '#22C55E',  // Self Service — verde
    xdock:  '#F59E0B',  // Cross Docking — âmbar
    xddrop: '#8B5CF6',  // XD Drop Off — roxo
    drop:   '#EF4444',  // Drop Off — vermelho (OFENSOR)
    red:    '#EF4444', green: '#22C55E', yellow: '#EAB308',
    bg:     '#0F172A', card:  '#1E293B', card2: '#0F1F33',
    border: '#334155', text:  '#F1F5F9', muted: '#94A3B8', dim: '#475569',
  };

  const PICKING_COLORS = {
    'FULFILLMENT':   C.full,
    'SELF_SERVICE':  C.self,
    'CROSS_DOCKING': C.xdock,
    'XD_DROP_OFF':   C.xddrop,
    'DROP_OFF':      C.drop,
  };
  const PICKING_LABELS = {
    'FULFILLMENT':   'Fulfillment',
    'SELF_SERVICE':  'Self Service',
    'CROSS_DOCKING': 'Cross Docking',
    'XD_DROP_OFF':   'XD Drop Off',
    'DROP_OFF':      'Drop Off',
  };

  // ─── DADOS REAIS DO BIGQUERY ──────────────────────────────────────────────────

  // KPIs gerais Q1 2025 vs Q1 2026
  const KPI_REAL = {
    q25: { visits: 619944688, orders: 41756145, conv: 6.735, promessa: 5.63 },
    q26: { visits: 926972231, orders: 62612573, conv: 6.755, promessa: 7.22 },
    delta_promessa: 1.59,
    delta_conv:     0.02, // pp
  };

  // Por Picking Type (real)
  const PICKING_DATA = [
    { picking: 'FULFILLMENT',   label: 'Fulfillment',   conv25: 9.82,  promessa25: 2.52, conv26: 9.27,  promessa26: 3.85 },
    { picking: 'SELF_SERVICE',  label: 'Self Service',  conv25: 11.15, promessa25: 0.97, conv26: 11.76, promessa26: 1.00 },
    { picking: 'CROSS_DOCKING', label: 'Cross Docking', conv25: 5.28,  promessa25: 5.81, conv26: 5.66,  promessa26: 8.02 },
    { picking: 'XD_DROP_OFF',   label: 'XD Drop Off',   conv25: 4.84,  promessa25: 5.66, conv26: 5.34,  promessa26: 7.06 },
    { picking: 'DROP_OFF',      label: 'Drop Off',      conv25: 2.81,  promessa25: 15.94,conv26: 1.72,  promessa26: 23.49 },
  ];

  // Top ofensores reais (ordenados por impacto)
  const OFFENDERS_REAL = [
    { estado: 'São Paulo',      picking: 'DROP_OFF',     rango: 'g. 200-500',  delta_dias: 10.46, delta_conv: -30.36, visits: 4886300,  impacto: 51125366 },
    { estado: 'São Paulo',      picking: 'CROSS_DOCKING',rango: 'g. 200-500',  delta_dias:  4.54, delta_conv: -14.19, visits: 10703539, impacto: 48603372 },
    { estado: 'São Paulo',      picking: 'DROP_OFF',     rango: 'b. 20-50',    delta_dias: 10.39, delta_conv: -40.03, visits: 3550944,  impacto: 36885253 },
    { estado: 'São Paulo',      picking: 'DROP_OFF',     rango: 'h. 500-1500', delta_dias: 10.28, delta_conv: -31.38, visits: 3249234,  impacto: 33401967 },
    { estado: 'São Paulo',      picking: 'DROP_OFF',     rango: 'c. 50-80',    delta_dias: 10.46, delta_conv: -40.24, visits: 2962178,  impacto: 30985181 },
    { estado: 'Minas Gerais',   picking: 'DROP_OFF',     rango: 'g. 200-500',  delta_dias: 10.51, delta_conv: -31.47, visits: 2205918,  impacto: 23184291 },
    { estado: 'Rio de Janeiro', picking: 'DROP_OFF',     rango: 'g. 200-500',  delta_dias: 10.17, delta_conv: -32.20, visits: 2145726,  impacto: 21822428 },
    { estado: 'Bahia',          picking: 'DROP_OFF',     rango: 'g. 200-500',  delta_dias: 11.46, delta_conv: -36.21, visits: 1732986,  impacto: 19863926 },
    { estado: 'São Paulo',      picking: 'CROSS_DOCKING',rango: 'h. 500-1500', delta_dias:  4.18, delta_conv: -10.68, visits: 4612614,  impacto: 19260726 },
    { estado: 'São Paulo',      picking: 'DROP_OFF',     rango: 'd. 80-125',   delta_dias: 10.61, delta_conv: -37.80, visits: 1640428,  impacto: 17404939 },
  ];

  // Delta de promessa por estado (real)
  const STATE_DATA = [
    { estado: 'Acre',               sigla: 'AC', dp: 5.54 },
    { estado: 'Rondônia',           sigla: 'RO', dp: 4.56 },
    { estado: 'Amapá',              sigla: 'AP', dp: 4.17 },
    { estado: 'Goiás',              sigla: 'GO', dp: 2.07 },
    { estado: 'São Paulo',          sigla: 'SP', dp: 2.00 },
    { estado: 'Rio de Janeiro',     sigla: 'RJ', dp: 1.80 },
    { estado: 'Minas Gerais',       sigla: 'MG', dp: 1.70 },
    { estado: 'Bahia',              sigla: 'BA', dp: 1.60 },
    { estado: 'Paraná',             sigla: 'PR', dp: 1.30 },
    { estado: 'Rio Grande do Sul',  sigla: 'RS', dp: 1.10 },
  ];

  // Elasticidade real por Rango ASP
  const ELASTICITY_REAL = [
    { rango: 'a. Até 20',     ela: -3.66, valido: true  },
    { rango: 'c. 50-80',      ela: -1.26, valido: true  },
    { rango: 'd. 80-125',     ela: -1.77, valido: true  },
    { rango: 'g. 200-500',    ela: -0.46, valido: true  },
    { rango: 'h. 500-1500',   ela:  2.30, valido: false }, // outlier — produto premium
  ];

  // Mix de visitas absolutas por picking (em milhões)
  const MIX_ABSOLUTO = [
    { label: 'Fulfillment',   vis25: 223, vis26: 337, delta_abs:  114, pct_change:  51, picking: 'FULFILLMENT'   },
    { label: 'Self Service',  vis25:  24, vis26:  31, delta_abs:    7, pct_change:  29, picking: 'SELF_SERVICE'  },
    { label: 'Cross Docking', vis25: 143, vis26: 200, delta_abs:   57, pct_change:  40, picking: 'CROSS_DOCKING' },
    { label: 'XD Drop Off',   vis25: 153, vis26: 285, delta_abs:  132, pct_change:  86, picking: 'XD_DROP_OFF'   },
    { label: 'Drop Off',      vis25:  75, vis26:  73, delta_abs:   -2, pct_change:  -3, picking: 'DROP_OFF'      },
  ];

  const ESTADOS_LISTA  = [...new Set(OFFENDERS_REAL.map(r => r.estado))];
  const PICKINGS_LISTA = ['FULFILLMENT','SELF_SERVICE','CROSS_DOCKING','XD_DROP_OFF','DROP_OFF'];
  const RANGOS_LISTA   = [...new Set(OFFENDERS_REAL.map(r => r.rango))].sort();

  // ─── Componente principal ─────────────────────────────────────────────────────
  function Dashboard() {
    const [fEstado,  setFEstado]  = React.useState('Todos');
    const [fPicking, setFPicking] = React.useState('Todos');
    const [fRango,   setFRango]   = React.useState('Todos');
    const [tab,      setTab]      = React.useState('overview');

    const offenders = React.useMemo(() => {
      return OFFENDERS_REAL.filter(r =>
        (fEstado  === 'Todos' || r.estado  === fEstado) &&
        (fPicking === 'Todos' || r.picking === fPicking) &&
        (fRango   === 'Todos' || r.rango   === fRango)
      );
    }, [fEstado, fPicking, fRango]);

    const maxImpacto = Math.max(...OFFENDERS_REAL.map(r => r.impacto));

    return (
      <div style={{minHeight:'100vh',background:C.bg,color:C.text,fontFamily:'Inter,-apple-system,sans-serif'}}>

        {/* ── Topbar ── */}
        <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:'14px 28px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,background:'linear-gradient(135deg,#FFE600,#FF7733)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:15,color:'#0F172A'}}>ML</div>
            <div>
              <div style={{fontWeight:700,fontSize:16}}>Diagnóstico · Lead Time de Promessa</div>
              <div style={{fontSize:11,color:C.muted}}>Comparativo Q1 2026 vs Q1 2025 · meli-bi-data.DADOSNN.TBL_VISITAS_POR_PROMESSA_POR_RANGO_NN</div>
            </div>
          </div>
          <div style={{fontSize:11,color:C.green,background:`${C.green}15`,border:`1px solid ${C.green}30`,padding:'4px 12px',borderRadius:20,fontWeight:600}}>
            Dados reais BigQuery
          </div>
        </div>

        <div style={{padding:'20px 28px'}}>

          {/* ── Filtros ── */}
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'16px 20px',marginBottom:20,display:'flex',gap:20,flexWrap:'wrap',alignItems:'flex-end'}}>
            {[
              {label:'Estado',       val:fEstado,  set:setFEstado,  opts:['Todos',...ESTADOS_LISTA]},
              {label:'Picking Type', val:fPicking, set:setFPicking, opts:['Todos',...PICKINGS_LISTA]},
              {label:'Rango ASP',    val:fRango,   set:setFRango,   opts:['Todos',...RANGOS_LISTA]},
            ].map(({label,val,set,opts}) => (
              <div key={label} style={{display:'flex',flexDirection:'column',gap:4}}>
                <span style={{color:C.muted,fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em'}}>{label}</span>
                <div style={{position:'relative'}}>
                  <select value={val} onChange={e=>set(e.target.value)}
                    style={{background:'#0F1A2E',color:C.text,border:`1px solid ${C.border}`,borderRadius:7,
                      padding:'7px 32px 7px 12px',fontSize:13,cursor:'pointer',outline:'none',minWidth:180}}>
                    {opts.map(o=><option key={o} value={o}>{o === 'Todos' ? o : (PICKING_LABELS[o] || o)}</option>)}
                  </select>
                  <span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',color:C.muted,fontSize:10}}>▼</span>
                </div>
              </div>
            ))}
            <button onClick={()=>{setFEstado('Todos');setFPicking('Todos');setFRango('Todos');}}
              style={{marginLeft:'auto',background:'transparent',border:`1px solid ${C.border}`,color:C.muted,
                borderRadius:7,padding:'7px 14px',fontSize:12,cursor:'pointer',alignSelf:'flex-end'}}>
              Limpar filtros
            </button>
          </div>

          {/* ── KPI Cards ── */}
          <div style={{display:'flex',gap:14,flexWrap:'wrap',marginBottom:20}}>
            {[
              {t:'Promessa Q1 2026', v:'7.22d', d:'+1.59d', dc:C.red, arrow:'▲', sub:'Média ponderada por visitas'},
              {t:'Promessa Q1 2025', v:'5.63d', d:null, sub:'Baseline de referência'},
              {t:'Conversão Q1 2026', v:'6.755%', d:'+0.02pp', dc:C.green, arrow:'▲', sub:'Aparentemente estável — mascarado pelo mix'},
              {t:'Conversão Q1 2025', v:'6.735%', d:null, sub:'Baseline de referência'},
              {t:'Visitas Q1 2026', v:'927M', d:'+49.5%', dc:C.green, arrow:'▲', sub:'619M → 927M visitas'},
              {t:'Pedidos Q1 2026',  v:'62.6M', d:'+49.9%', dc:C.green, arrow:'▲', sub:'41.8M → 62.6M pedidos'},
            ].map(({t,v,d,dc,arrow,sub})=>(
              <div key={t} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 18px',flex:'1 1 140px',minWidth:140}}>
                <div style={{color:C.muted,fontSize:11,marginBottom:6}}>{t}</div>
                <div style={{fontSize:26,fontWeight:700,lineHeight:1}}>{v}</div>
                {d && <div style={{color:dc,fontSize:12,marginTop:5,fontWeight:600}}>{arrow} {d} <span style={{color:C.muted,fontWeight:400}}>vs Q1 2025</span></div>}
                <div style={{color:C.dim,fontSize:10,marginTop:4}}>{sub}</div>
              </div>
            ))}
          </div>

          {/* ── Insight Banner ── */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:20}}>
            <div style={{background:`${C.drop}12`,border:`1px solid ${C.drop}40`,borderRadius:10,padding:'12px 16px'}}>
              <div style={{color:C.drop,fontWeight:700,fontSize:12,marginBottom:4}}>GRANDE OFENSOR: Drop Off</div>
              <div style={{color:C.muted,fontSize:12,lineHeight:1.5}}>
                Promessa subiu de <strong style={{color:C.text}}>15.94d → 23.49d</strong> (+7.55d).<br/>
                Conversão caiu de <strong style={{color:C.text}}>2.81% → 1.72%</strong> (-39%).<br/>
                Volume de visitas <strong style={{color:C.drop}}>caiu</strong> (75M → 73M) — único picking que ENCOLHEU.
              </div>
            </div>
            <div style={{background:`${C.yellow}12`,border:`1px solid ${C.yellow}40`,borderRadius:10,padding:'12px 16px'}}>
              <div style={{color:C.yellow,fontWeight:700,fontSize:12,marginBottom:4}}>CONVERSÃO GERAL: ILUSAO OPTICA</div>
              <div style={{color:C.muted,fontSize:12,lineHeight:1.5}}>
                A conversão geral <strong style={{color:C.text}}>ficou estável (+0.02pp)</strong>, mas isso mascara o problema.<br/>
                O crescimento do <strong style={{color:C.full}}>Fulfillment</strong> (conv 9.27%) e <strong style={{color:C.self}}>Self Service</strong> (11.76%) compensa a queda do Drop Off.
              </div>
            </div>
            <div style={{background:`${C.xddrop}12`,border:`1px solid ${C.xddrop}40`,borderRadius:10,padding:'12px 16px'}}>
              <div style={{color:C.xddrop,fontWeight:700,fontSize:12,marginBottom:4}}>XD DROP OFF: CRESCIMENTO EXPLOSIVO</div>
              <div style={{color:C.muted,fontSize:12,lineHeight:1.5}}>
                153M → <strong style={{color:C.text}}>285M visitas</strong> (+86%).<br/>
                Promessa subiu de <strong style={{color:C.text}}>5.66d → 7.06d</strong> (+1.40d).<br/>
                Regioes Norte (<strong style={{color:C.red}}>Acre +5.54d, Rondônia +4.56d, Amapá +4.17d</strong>) mais afetadas.
              </div>
            </div>
          </div>

          {/* ── Tabs ── */}
          <div style={{display:'flex',gap:2,borderBottom:`1px solid ${C.border}`,marginBottom:20}}>
            {[
              {id:'overview',   l:'Visão Geral'},
              {id:'breakpoint', l:'Breakpoint'},
              {id:'offenders',  l:'Ofensores'},
              {id:'elasticity', l:'Elasticidade'},
              {id:'mix',        l:'Mix Logístico'},
              {id:'hypotheses', l:'Hipóteses'},
            ].map(({id,l})=>(
              <button key={id} onClick={()=>setTab(id)}
                style={{background:tab===id?C.full:'transparent',color:tab===id?'#fff':C.muted,
                  border:'none',borderRadius:'6px 6px 0 0',padding:'9px 18px',cursor:'pointer',
                  fontSize:13,fontWeight:500,transition:'all 0.15s'}}>
                {l}
              </button>
            ))}
          </div>

          {/* ════════════════ TAB: VISÃO GERAL ════════════════ */}
          {tab === 'overview' && (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>

              <ChartCard title="Promessa Média por Picking Type — Q1 2025 vs Q1 2026" sub="Dias de promessa — Drop Off é o grande ofensor (+7.55d)">
                <ResponsiveContainer width="100%" height={300}>
                  <BarChart data={PICKING_DATA} margin={{top:4,right:10,bottom:20,left:0}}>
                    <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                    <XAxis dataKey="label" tick={{fill:C.muted,fontSize:11}} angle={-20} textAnchor="end" interval={0} />
                    <YAxis tick={{fill:C.muted,fontSize:10}} unit="d" />
                    <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8}} formatter={v=>`${v}d`} />
                    <Legend wrapperStyle={{fontSize:12}} />
                    <Bar dataKey="promessa25" name="Q1 2025" radius={[3,3,0,0]} opacity={0.75}>
                      {PICKING_DATA.map((e,i)=><Cell key={i} fill={PICKING_COLORS[e.picking]} opacity={0.55} />)}
                    </Bar>
                    <Bar dataKey="promessa26" name="Q1 2026" radius={[3,3,0,0]}>
                      {PICKING_DATA.map((e,i)=><Cell key={i} fill={PICKING_COLORS[e.picking]} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
                <AlertBox color={C.drop} text="Drop Off: 15.94d → 23.49d (+7.55d). É o único picking com conversão CAINDO (-39%) e volume ENCOLHENDO." />
              </ChartCard>

              <ChartCard title="Conversão por Picking Type — Q1 2025 vs Q1 2026" sub="Taxa de conversão (%) — Self Service e Fulfillment crescem, Drop Off despenca">
                <ResponsiveContainer width="100%" height={300}>
                  <BarChart data={PICKING_DATA} margin={{top:4,right:10,bottom:20,left:0}}>
                    <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                    <XAxis dataKey="label" tick={{fill:C.muted,fontSize:11}} angle={-20} textAnchor="end" interval={0} />
                    <YAxis tick={{fill:C.muted,fontSize:10}} unit="%" />
                    <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8}} formatter={v=>`${v}%`} />
                    <Legend wrapperStyle={{fontSize:12}} />
                    <Bar dataKey="conv25" name="Q1 2025" radius={[3,3,0,0]}>
                      {PICKING_DATA.map((e,i)=><Cell key={i} fill={PICKING_COLORS[e.picking]} opacity={0.55} />)}
                    </Bar>
                    <Bar dataKey="conv26" name="Q1 2026" radius={[3,3,0,0]}>
                      {PICKING_DATA.map((e,i)=><Cell key={i} fill={PICKING_COLORS[e.picking]} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
                <AlertBox color={C.yellow} text="Conversão geral +0.02pp — aparentemente estável. Mascarado pelo crescimento de Fulfillment (conv 9.27%) e Self Service (11.76%) que compensam a queda do Drop Off." />
              </ChartCard>

              <div style={{gridColumn:'1/-1'}}>
                <ChartCard title="Tabela Resumo por Picking Type — Dados Reais BigQuery" sub="Q1 2025 vs Q1 2026 · Fonte: meli-bi-data.DADOSNN.TBL_VISITAS_POR_PROMESSA_POR_RANGO_NN">
                  <div style={{overflowX:'auto'}}>
                    <table style={{fontSize:13}}>
                      <thead>
                        <tr style={{borderBottom:`1px solid ${C.border}`}}>
                          {['Picking Type','Promessa Q1/25','Promessa Q1/26','Δ Promessa','Conv. Q1/25','Conv. Q1/26','Δ Conversão','Status'].map(h=>(
                            <th key={h} style={{padding:'8px 16px',textAlign:'left',color:C.muted,fontWeight:600,whiteSpace:'nowrap'}}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {PICKING_DATA.map((r,i)=>{
                          const dDias = (r.promessa26 - r.promessa25).toFixed(2);
                          const dConv = (r.conv26 - r.conv25).toFixed(2);
                          const isDrop = r.picking === 'DROP_OFF';
                          return (
                            <tr key={i} style={{borderBottom:`1px solid ${C.border}20`,background:isDrop?`${C.drop}08`:'transparent'}}>
                              <td style={{padding:'11px 16px'}}>
                                <div style={{display:'flex',alignItems:'center',gap:8}}>
                                  <div style={{width:10,height:10,borderRadius:2,background:PICKING_COLORS[r.picking]}} />
                                  <span style={{fontWeight:isDrop?700:400,color:isDrop?C.drop:C.text}}>{r.label}</span>
                                  {isDrop && <span style={{background:`${C.drop}20`,color:C.drop,fontSize:10,padding:'1px 6px',borderRadius:4,fontWeight:700}}>OFENSOR</span>}
                                </div>
                              </td>
                              <td style={{padding:'11px 16px',color:C.muted}}>{r.promessa25}d</td>
                              <td style={{padding:'11px 16px',fontWeight:600,color:isDrop?C.drop:C.text}}>{r.promessa26}d</td>
                              <td style={{padding:'11px 16px',color:C.drop,fontWeight:700}}>+{dDias}d</td>
                              <td style={{padding:'11px 16px',color:C.muted}}>{r.conv25}%</td>
                              <td style={{padding:'11px 16px',color:isDrop?C.drop:C.text}}>{r.conv26}%</td>
                              <td style={{padding:'11px 16px',color:parseFloat(dConv)>=0?C.green:C.drop,fontWeight:600}}>
                                {parseFloat(dConv)>=0?'+':''}{dConv}pp
                              </td>
                              <td style={{padding:'11px 16px'}}>
                                {isDrop
                                  ? <span style={{color:C.drop,fontWeight:700}}>Crítico — agir urgente</span>
                                  : r.picking==='SELF_SERVICE'
                                    ? <span style={{color:C.green}}>Saudável</span>
                                    : <span style={{color:C.yellow}}>Monitorar</span>
                                }
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </ChartCard>
              </div>

            </div>
          )}

          {/* ════════════════ TAB: BREAKPOINT ════════════════ */}
          {tab === 'breakpoint' && (
            <div style={{display:'grid',gridTemplateColumns:'1fr',gap:18}}>

              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'20px'}}>

                  n:'3', color:C.yellow, prob:'Média — 60%',
                  title:'Algoritmo de Promessa em Modo Defensivo',
                  body:'O sistema de promise pode estar usando janela histórica contaminada por picos de entrega para calibrar SLA. Se o algoritmo inflou promessas como buffer após o volume de Q4/2025, e o volume de Q1/2026 não foi suficiente para forçar recalibração, as promessas permanecem infladas artificialmente — principalmente no Drop Off, que tem menos dados históricos robustos para recalibrar.',
                  test:'Comparar promessa exibida ao cliente com o tempo médio real de entrega (ETD vs ETA). Se promessa exibida > tempo real de entrega em 2+ dias: é buffer algorítmico.',
                  action:'Forçar reset da janela de calibração do algoritmo de promessa para Jan–Mar/2026 e monitorar impacto na conversão em A/B test com 10% do tráfego Drop Off.',
                },
                {
                  n:'4', color:C.full, prob:'Média — 55%',
                  title:'Expansão de Fulfillment como Alavanca Principal',
                  body:'Fulfillment tem a melhor promessa (3.85d) e a maior conversão (9.27%) entre todos os pickings. Share ficou estável em ~36%, mas o volume cresceu 51%. Se conseguirmos migrar sellers de Drop Off para Fulfillment, há ganho duplo: promessa menor e conversão maior. O risco é a capacidade dos CDs para absorver mais estoque.',
                  test:'Identificar top sellers Drop Off por GMV que têm perfil adequado ao Fulfillment (produto físico, volume regular, margem suficiente para estoque nos CDs).',
                  action:'Criar campanha de migração Drop Off → Fulfillment com incentivo de fee reduzido por 90 dias. Meta: migrar 500 sellers representando >10% do volume Drop Off em SP/MG/RJ.',
                },
              ].map(h=>(
                <div key={h.n} style={{background:C.card,border:`1px solid ${h.color}40`,borderRadius:12,padding:20}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                    <div style={{display:'flex',gap:10,alignItems:'center'}}>
                      <div style={{width:32,height:32,background:`${h.color}25`,border:`1px solid ${h.color}50`,
                        borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',color:h.color,fontWeight:700}}>
                        {h.n}
                      </div>
                      <div style={{fontWeight:700,fontSize:15,color:C.text,maxWidth:280}}>{h.title}</div>
                    </div>
                    <span style={{background:`${h.color}20`,color:h.color,padding:'3px 10px',borderRadius:20,fontSize:11,whiteSpace:'nowrap',fontWeight:600,flexShrink:0,marginLeft:8}}>{h.prob}</span>
                  </div>
                  <p style={{color:C.muted,fontSize:13,lineHeight:1.6,marginBottom:12}}>{h.body}</p>
                  <div style={{background:`${h.color}0A`,border:`1px solid ${h.color}25`,borderRadius:8,padding:'10px 14px',marginBottom:10}}>
                    <div style={{color:h.color,fontWeight:600,fontSize:11,marginBottom:4}}>TESTE DE VALIDACAO</div>
                    <div style={{color:C.muted,fontSize:12}}>{h.test}</div>
                  </div>
                  <div style={{background:`${C.green}08`,border:`1px solid ${C.green}25`,borderRadius:8,padding:'10px 14px'}}>
                    <div style={{color:C.green,fontWeight:600,fontSize:11,marginBottom:4}}>ACAO RECOMENDADA</div>
                    <div style={{color:C.muted,fontSize:12}}>{h.action}</div>
                  </div>
                </div>
              ))}

              <div style={{gridColumn:'1/-1'}}>
                <ChartCard title="Argumento Executivo — SCQA para Diretoria" sub="Framework Situation / Complication / Question / Answer — baseado nos dados reais do BigQuery">
                  <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,padding:'8px 0'}}>
                    {[
                      {l:'SITUATION', c:C.full, t:'Promessa cresceu +1.59d em Q1 2026 vs Q1 2025. Conversão aparenta estabilidade (+0.02pp), mas esse número mascara distorções graves por picking type.'},
                      {l:'COMPLICATION', c:C.drop, t:'Drop Off: promessa de 23.49d (+7.55d, +47%), conversão caiu -39% (2.81% → 1.72%). 8 dos 10 maiores ofensores são Drop Off. Conversão geral só ficou "estável" porque Fulfillment e Self Service cresceram e compensaram.'},
                      {l:'QUESTION', c:C.yellow, t:'Por que a promessa do Drop Off degradou +7.55d quando o volume desse picking CAIU 3%? E por que o XD Drop Off cresceu +86% em visitas sem ajuste de SLA?'},
                      {l:'ANSWER', c:C.green, t:'Drop Off com SLA deteriorado (parceiros logísticos) + algoritmo defensivo. XD Drop Off absorveu parte do mix shift sem capacidade adequada. Ação: auditar parceiros Drop Off + migrar sellers para Fulfillment + ampliar hubs XD no Norte.'},
                    ].map(s=>(
                      <div key={s.l} style={{background:`${s.c}10`,border:`1px solid ${s.c}30`,borderRadius:10,padding:'14px'}}>
                        <div style={{color:s.c,fontWeight:700,fontSize:11,marginBottom:8,letterSpacing:'0.08em'}}>{s.l}</div>
                        <div style={{color:C.muted,fontSize:12,lineHeight:1.6}}>{s.t}</div>
                      </div>
                    ))}
                  </div>
                </ChartCard>
              </div>
            </div>
          )}

        </div>

        {/* Footer */}
        <div style={{borderTop:`1px solid ${C.border}`,padding:'14px 28px',color:C.dim,fontSize:11,textAlign:'center'}}>
          Dashboard · Lead Time de Promessa · Dados reais BigQuery Q1 2025 vs Q1 2026
          · Fonte: <code style={{color:C.muted}}>meli-bi-data.DADOSNN.TBL_VISITAS_POR_PROMESSA_POR_RANGO_NN</code>
          · Atualizado: 2026-04-24
        </div>
      </div>
    );
  }

  // ─── Sub-componentes ──────────────────────────────────────────────────────────
  function ChartCard({title,sub,children}) {
    return (
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'18px 20px'}}>
        <div style={{marginBottom:14}}>
          <div style={{fontWeight:600,fontSize:14,color:C.text}}>{title}</div>
          {sub && <div style={{color:C.muted,fontSize:11,marginTop:2}}>{sub}</div>}
        </div>
        {children}
      </div>
    );
  }

  function AlertBox({color,text}) {
    return (
      <div style={{marginTop:14,padding:'10px 14px',background:`${color}10`,border:`1px solid ${color}30`,borderRadius:8,fontSize:12,color:C.muted,lineHeight:1.5}}>
        <strong style={{color}}>Insight: </strong>{text}
      </div>
    );
  }

  // ─── Mount ────────────────────────────────────────────────────────────────────
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<Dashboard />);
  </script>
</body>
</html>
